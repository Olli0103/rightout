name: Release

on:
  workflow_call:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.19.0"
          cache: npm
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: npm ci --ignore-scripts
      - run: npm audit --omit=dev --audit-level=high
      - run: make test
      - run: npm run test:coverage
      - run: make installer-test
      - name: Require the audited v0.8.0 public correction
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(gh release view v0.8.0 --repo "$GITHUB_REPOSITORY" --json isPrerelease --jq '.isPrerelease')" = "true"
          test "$(gh release view v0.8.0 --repo "$GITHUB_REPOSITORY" --json body --jq '.body')" = "$(cat docs/release-correction-v0.8.0.md)"
      - name: Require a GitHub-verified signed release tag
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag_object_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${GITHUB_REF_NAME}" --jq '.object.sha')"
          test "$(git cat-file -t "$tag_object_sha")" = "tag"
          test "$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}" --jq '.verification.verified')" = "true"
      - name: Build clean release archive
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          version="$(cat VERSION)"
          test "$GITHUB_REF_NAME" = "v${version}"
          test "$(git cat-file -t "$GITHUB_REF_NAME")" = "tag"
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          archive="$(npm pack --json --ignore-scripts | python3 -c 'import json,sys; print(json.load(sys.stdin)[0]["filename"])')"
          sha256sum "$archive" > RELEASE-SHA256SUMS
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Build machine-readable release evidence
        shell: bash
        env:
          ARCHIVE: ${{ steps.pack.outputs.archive }}
          VERSION: ${{ steps.pack.outputs.version }}
        run: |
          set -euo pipefail
          export ARCHIVE_SHA256="$(sha256sum "$ARCHIVE" | cut -d' ' -f1)"
          python3 - <<'PY'
          import json
          import os

          evidence = {
              "schema_version": "rightout.release-evidence.v1",
              "version": os.environ["VERSION"],
              "tag": os.environ["GITHUB_REF_NAME"],
              "source_ref": os.environ["GITHUB_REF"],
              "source_commit": os.environ["GITHUB_SHA"],
              "workflow": os.environ["GITHUB_WORKFLOW"],
              "workflow_ref": os.environ["GITHUB_WORKFLOW_REF"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "run_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              "archive": os.environ["ARCHIVE"],
              "archive_sha256": os.environ["ARCHIVE_SHA256"],
          }
          with open("RELEASE-EVIDENCE.json", "w", encoding="utf-8") as handle:
              json.dump(evidence, handle, indent=2, sort_keys=True)
              handle.write("\n")
          PY
      - name: Attest release archive provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ steps.pack.outputs.archive }}
      - name: Verify release archive attestation before publication
        env:
          GH_TOKEN: ${{ github.token }}
          ARCHIVE: ${{ steps.pack.outputs.archive }}
        run: gh attestation verify "$ARCHIVE" --repo "$GITHUB_REPOSITORY"
      - name: Upload workflow evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rightout-${{ steps.pack.outputs.version }}-release-evidence
          path: |
            ${{ steps.pack.outputs.archive }}
            RELEASE-SHA256SUMS
            RELEASE-EVIDENCE.json
            SBOM.spdx.json
            docs/catalog-provenance.json
            docs/unbroker-upstream-refresh.json
          if-no-files-found: error
      - name: Publish versioned release assets
        env:
          GH_TOKEN: ${{ github.token }}
          ARCHIVE: ${{ steps.pack.outputs.archive }}
          VERSION: ${{ steps.pack.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            "$ARCHIVE" RELEASE-SHA256SUMS RELEASE-EVIDENCE.json SBOM.spdx.json docs/catalog-provenance.json docs/unbroker-upstream-refresh.json \
            --verify-tag \
            --title "RightOut v${VERSION}" \
            --notes-file "docs/release-notes-v${VERSION}.md"
